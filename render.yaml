services:
  - type: web
    name: chlbots-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: MONGODB_URI
        sync: false
      - key: SAMBANOVA_API_KEY
        sync: false
